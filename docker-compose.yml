services:

  backend:
    build: ./RAG_quizz

    container_name: rag_backend

    ports:
      - "8000:8000"

    env_file:
      - ./RAG_quizz/.env

    volumes:
      - ./RAG_quizz/storage:/app/storage
      - ./RAG_quizz/data:/app/data

  frontend:
    build: ./RAG_Frontend

    container_name: rag_frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend